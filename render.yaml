services:
  - type: web
    runtime: static
    name: deepfake-detector-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    envVars:
      - key: VITE_DEEPFAKE_API_BASE
        value: https://krishangopal23-deepfake-detector.hf.space
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
